<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:ital,wght@0,700;0,800;1,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src//reset.css" />
    <link rel="stylesheet" href="/src/style.css" />
    <link rel="stylesheet" href="/src/project.css" />
    <title>Contact | Alireza Amani</title>
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-links">
        <a href="./index.html">HOME</a>
        <a href="./contact.html">CONTACT</a>
        <a href="https://alireza-amani.github.io/cv/" target="_blank" rel="noopener noreferrer">CV ↗</a>
      </div>
    </nav>

    <header class="aug-hero">
      <a href="./index.html" class="back-link">← Back to Projects</a>
      <div class="spotlight"></div>
      <div class="aug-hero-content">
        <h1>Dialogue</h1>
        <p class="aug-subtitle">"The unexamined life is not worth living"</p>
      </div>
    </header>

    <section class="par-executive-grid contact-grid">
      <div
        class="par-box problem-box"
        style="--color-problem: var(--accent-gold)"
      >
        <h4>EMAIL</h4>
        <p>
          <a href="mailto:alireza.amani101@gmail.com" class="contact-link"
            >alireza.amani101@gmail.com</a
          >
        </p>
      </div>
      <div class="par-box action-box" style="--color-action: var(--text-muted)">
        <h4>NETWORK</h4>
        <p>
          <a
            href="https://www.linkedin.com/in/alireza--amani/"
            class="contact-link"
            target="_blank"
            rel="noopener noreferrer"
            >LinkedIn</a
          >
          /
          <a
            href="https://github.com/Alireza-Amani"
            class="contact-link"
            target="_blank"
            rel="noopener noreferrer"
            >GitHub</a
          >
        </p>
      </div>
      <div
        class="par-box result-box"
        style="--color-result: rgba(255, 255, 255, 0.2)"
      >
        <h4>Research</h4>
        <a
          href="https://scholar.google.com/citations?hl=en&user=kcXulMQAAAAJ"
          class="contact-link"
          target="_blank"
          rel="noopener noreferrer"
          >Google Scholar</a
        >
      </div>
    </section>

    <main class="aug-deep-dive">
      <article
        class="dive-section"
        style="text-align: center; max-width: 600px; margin: 0 auto"
      >
        <h2>Start a Dialogue</h2>

        <form class="contact-form" action="#" method="POST">
          <input type="text" name="name" placeholder="Your Name" required />
          <input type="email" name="email" placeholder="Your Email" required />
          <input type="text" name="subject" placeholder="Subject" />
          <textarea
            name="message"
            placeholder="Your Message"
            required
          ></textarea>
          <button type="submit" class="submit-btn">Speak</button>
        </form>
      </article>
    </main>

    <footer>
      <p>© 2026 Alireza Amani. All rights reserved.</p>
    </footer>
    <script data-goatcounter="https://curious-alireza.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
  </body>

</html>
